      font-family: var(--font-text);
      font-weight: 500;
      font-size: 11.5px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--on-deep-muted);
      margin: 0 0 18px;
    }
    .site-footer a { color: var(--on-deep); display: block; padding: 4px 0; opacity: .8; }
    .site-footer a:hover { opacity: 1; }
    .site-footer a.btn { display: inline-flex; opacity: 1; padding: 16px 24px; }
    .site-footer a.btn-on-deep { color: var(--verde-petroleo); }
    .site-footer .legal {
      grid-column: 1 / -1;
      border-top: 1px solid rgba(232,226,212,.15);
      padding-top: 24px;
      margin-top: 24px;
      display: flex; justify-content: space-between;
      font-size: 12px;
      color: var(--on-deep-muted);
      flex-wrap: wrap; gap: 12px;
    }

    /* Loading splash */
    #splash {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      transition: opacity .5s ease;
      font-family: var(--font-display);
      font-style: italic;
      letter-spacing: -0.03em;
      color: var(--fg);
    }
    #splash.gone { opacity: 0; pointer-events: none; }
